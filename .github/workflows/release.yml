name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to attach assets to a Release

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-22.04
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: macos-x86_64
            runner: macos-13
          - target: macos-aarch64
            runner: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libgomp1

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Build
        run: make -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Run unit tests
        run: make test

      - name: Smoke test the binary
        run: ./build/wat --help || ./build/wat -h || true

      - name: Package
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          stage="wat-${TAG}-${TARGET}"
          mkdir -p "$stage"
          cp build/wat LICENSE README.md "$stage/"
          tar czf "dist/${stage}.tar.gz" "$stage"
          ( cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wat-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
